[advisories]
ignore = [
    "RUSTSEC-2023-0071", # The vulnerability pertains to the use of RSA private keys in the rsa crate. We only use this crate to evaluate RSA public keys as found in Google CA certificates.
    "RUSTSEC-2024-0436", # This is a transitive dependency that is no longer maintained but used by a couple dependencies. Waiting for dependencies to find alternatives.
    "RUSTSEC-2025-0134", # This is a transitive dependency that is no longer maintained. Waiting for testcontainers_modules to update to new testcontainers version in which it should be fixed.
    "RUSTSEC-2025-0141", # `bincode` is a transitive dependency that is no longer maintained but considered complete and used by `http-cache`. Waiting for `http-cache` to find alternatives.
    "RUSTSEC-2026-0066", # This is a transitive dependency that is only run as a dev-dependency. Waiting for testcontainers to update to new astral-tokio-tar version in which it should be fixed.
]
