## Global Docker image parameters
## Please, note that this will override the image parameters, including dependencies, configured to use the global value
## Current available global Docker image parameters: imageRegistry
## @section Global parameters
## @param global.imageRegistry Global Docker image registry
##
global:
  imageRegistry: ""

## @section Image parameters
## @param image.repository Repository for the container image
## @param image.pullPolicy Image pull policy
## @param image.tag Image tag
##
image:
  repository: null
  pullPolicy: IfNotPresent
  tag: null

## @section Image preload parameters
## Parameters for the preload container image
## @param imagePreload.repository Repository for the preload container image
## @param imagePreload.pullPolicy Image pull policy for the preload container
##
imagePreload:
  repository: null
  pullPolicy: IfNotPresent

## @section Image GBA Frontend parameters
## Parameters for the GBA Frontend container image
## @param imageGbaFrontend.repository Repository for the GBA Frontend container image
## @param imageGbaFrontend.pullPolicy Image pull policy for the GBA Frontend container
##
imageGbaFrontend:
  repository: null
  pullPolicy: IfNotPresent

## @section Image pull secrets
## @param imagePullSecrets Array of secret names for private registries
##
imagePullSecrets: []

## @section Security parameters
## @param serviceAccountName Name of the service account
## @param podSecurityContext Security context for the pod
## @param securityContext Security context for the container
##
serviceAccountName: null
podSecurityContext: {}
securityContext: {}

## @section Network Policy configuration
## Parameters for the network policy configuration
## @param networkPolicy.ingress Ingress rules for GBA converter pods pods
##
networkPolicy:
  ingress: []

## @section GBA HC Converter parameters
## Parameters for the GBA HC Converter configuration
## @param gbaHcConverter.replicaCount Number of replicas for the GBA HC Converter
## @param gbaHcConverter.extraAnnotations Additional annotations for the BA HC Converter deployment
## @param gbaHcConverter.extraPodLabels Additional labels for the BA HC Converter pods
## @param gbaHcConverter.runMode Run mode for the GBA HC Converter (e.g., ALL, PRELOADED, GBAV)
## @param gbaHcConverter.envVarNamePreloaded Environment variable name for the preloaded run mode
## @param gbaHcConverter.envVarNameGbav Environment variable name for the GBAV run mode
## @param gbaHcConverter.preloadedXmlPath Path to the preloaded XML files
## @param gbaHcConverter.probes.config.liveness Additional configuration for liveness probe
## @param gbaHcConverter.probes.config.readiness Additional configuration for readiness probe
## @param gbaHcConverter.probes.config.startup Additional configuration for startup probe
## @param gbaHcConverter.probes.disableLiveness Disable liveness probe
## @param gbaHcConverter.probes.useLivenessAsReadiness Use liveness endpoint for readiness
## @param gbaHcConverter.resources.requests.cpu CPU request
## @param gbaHcConverter.resources.requests.memory Memory request
## @param gbaHcConverter.resources.limits.cpu CPU limit
## @param gbaHcConverter.resources.limits.memory Memory limit
##
gbaHcConverter:
  replicaCount: 2
  extraAnnotations: {}
  extraPodLabels: {}
  runMode: PRELOADED
  envVarNamePreloaded: PRELOADED
  envVarNameGbav: ALL__GBAV
  preloadedXmlPath: "resources/encrypted-gba-v-responses"
  probes:
    config:
      liveness: {}
      readiness: {}
      startup: {}
    disableLiveness: false
    useLivenessAsReadiness: false
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

## @section GBA CLI Tool parameters
## Parameters for the GBA CLI Tool configuration
## @param gbaCliTool.enabled Enable or disable the GBA CLI Tool
## @param gbaCliTool.useRijksweb Enable or disable the use of Rijksweb proxy
##
gbaCliTool:
  enabled: false
  useRijksweb: false

## @section GBA Encrypt Test Data parameters
## Parameters for the GBA Encrypt Test Data configuration
## @param gbaEncryptTestData.name Name of the GBA Encrypt Test Data cronjob
## @param gbaEncryptTestData.enabled Enable or disable the GBA Encrypt Test Data
## @param gbaEncryptTestData.extraAnnotations Additional annotations for the GBA Encrypt Test Data cronjob
## @param gbaEncryptTestData.extraPodLabels Additional labels for the GBA Encrypt Test Data pods
##
gbaEncryptTestData:
  name: encrypt-gba-v-testdata
  enabled: false
  extraAnnotations: {}
  extraPodLabels: {}

## @section Host Aliases
## Host aliases for the containers
## @param hostAliases List of host aliases
##
hostAliases: []

## @section Frontend parameters
## Parameters for the GBA Fetch frontend configuration
## @param frontend.replicaCount Number of replicas for the GBA Fetch frontend
## @param frontend.name Name of the GBA Fetch frontend application
## @param frontend.extraAnnotations Additional annotations for the frontend deployment
## @param frontend.extraPodLabels Additional labels for the frontend pods
## @param frontend.httpRoute.enabled Enable or disable the route
## @param frontend.httpRoute.parentRefs Parent references to the gateway
## @param frontend.httpRoute.hostnames Hostnames for the route
## @param frontend.httpRoute.contextPath Optional context path for the route
## @param frontend.httpRoute.labels Additional labels for the route
## @param frontend.httpRoute.annotations Additional annotations for the route
## @param frontend.probes.config.liveness Additional configuration for liveness probe
## @param frontend.probes.config.readiness Additional configuration for readiness probe
## @param frontend.probes.config.startup Additional configuration for startup probe
## @param frontend.probes.disableLiveness Disable liveness probe
## @param frontend.probes.useLivenessAsReadiness Use liveness endpoint for readiness
## @param frontend.resources.requests.cpu CPU request for the frontend container
## @param frontend.resources.requests.memory Memory request for the frontend container
## @param frontend.resources.limits.cpu CPU limit for the frontend container
## @param frontend.resources.limits.memory Memory limit for the frontend container
##
frontend:
  replicaCount: 1
  name: gba-fetch-frontend
  extraAnnotations: {}
  extraPodLabels: {}
  httpRoute:
    enabled: true
    parentRefs: []
    hostnames: []
    contextPath: null
    labels: {}
    annotations: {}
  probes:
    config:
      liveness: {}
      readiness: {}
      startup: {}
    disableLiveness: false
    useLivenessAsReadiness: false
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

## @section Preload GBA deployement parameters
## Parameters for the Preload GBA deployement configuration
## @param preloadGba.name Name of the Preload GBA Deployment
## @param preloadGba.extraAnnotations Additional annotations
## @param preloadGba.extraPodLabels Additional labels
## @param preloadGba.volumeClaimName Name of the volume claim
## @param preloadGba.storageClassName Storage class name for the volume claim
## @param preloadGba.resources.requests.cpu CPU request
## @param preloadGba.resources.requests.memory Memory request
## @param preloadGba.resources.limits.cpu CPU limit
## @param preloadGba.resources.limits.memory Memory limit
##
preloadGba:
  name: preload-gba-v-data
  extraAnnotations: {}
  extraPodLabels: {}
  volumeClaimName: preloaded-gba-v-data
  storageClassName: nfs
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

## @section xml files
## Parameters for the XML files used in the GBA HC Converter
## @param xmlFiles List of XML files to be used in the GBA HC Converter
##
xmlFiles: {}

## @section zoekXmlFiles
## Parameters for the XML files used in the GBA HC Converter for Zoek
## @param zoekXmlFiles List of XML files to be used in the GBA HC Converter
