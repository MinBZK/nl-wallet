## Global Docker image parameters
## Please, note that this will override the image parameters, including dependencies, configured to use the global value
## Current available global Docker image parameters: imageRegistry and imagePullSecrets
## @section Global parameters
## @param global.imageRegistry Global Docker image registry
##
global:
  imageRegistry: ""

## @section Common parameters
## String to partially override the chart's fullname template
## @param nameOverride String to partially override chart's fullname
##
nameOverride: ""

## @section Common parameters
## Number of replicas
## @param replicaCount Number of replicas
##
replicaCount: 2

## @section Image parameters
## @param image.repository Repository for the container image
## @param image.pullPolicy Image pull policy
## @param image.tag Image tag
##
image:
  repository: null
  pullPolicy: IfNotPresent
  tag: null

## @section Image migration parameters
## @param imageMigrations.repository Repository for the migration container image
## @param imageMigrations.pullPolicy Image pull policy for the migration container
##
imageMigrations:
  repository: null
  pullPolicy: IfNotPresent

## @section Annotations and labels
## Additional annotations and labels
## @param extraAnnotations Additional annotations for the deployment
## @param extraPodLabels Additional labels for the pods
##
extraAnnotations: {}
extraPodLabels: {}

## @section Image pull secrets
## Secrets for pulling images from private registries
## @param imagePullSecrets Array of secret names for private registries
##
imagePullSecrets: []

## @section Pod security context
## Security context for the pod
## @param podSecurityContext Security context for the pod
podSecurityContext: {}

## @section Security context
## Security context for the container
## @param securityContext Security context for the container
##
securityContext: {}

## @section HTTP route parameters
## Parameters for the HTTPRoute configuration
## @param httpRoute.enabled Enable or disable the route
## @param httpRoute.parentRefs Parent references to the gateway
## @param httpRoute.hostnames Hostnames for the route
## @param httpRoute.contextPath Optional context path for the route
## @param httpRoute.labels Additional labels for the route
## @param httpRoute.annotations Additional annotations for the route
##
httpRoute:
  enabled: true
  parentRefs: []
  hostnames: []
  contextPath: null
  labels: {}
  annotations: {}

## @section HTTP route internal parameters
## Parameters for the HTTPRoute configuration
## @param httpRouteInternal.enabled Enable or disable the route
## @param httpRouteInternal.parentRefs Parent references to the gateway
## @param httpRouteInternal.hostnames Hostnames for the route
## @param httpRouteInternal.labels Additional labels for the route
## @param httpRouteInternal.annotations Additional annotations for the route
##
httpRouteInternal:
  enabled: true
  parentRefs: []
  hostnames: []
  labels: {}
  annotations: {}

## @section Container probes
## @param probes.config.liveness Additional configuration for liveness probe
## @param probes.config.readiness Additional configuration for readiness probe
## @param probes.config.startup Additional configuration for startup probe
## @param probes.disableLiveness Disable liveness probe
## @param probes.useLivenessAsReadiness Use liveness endpoint for readiness
##
probes:
  config:
    liveness: {}
    readiness: {}
    startup: {}
  disableLiveness: false
  useLivenessAsReadiness: false

## @section Resource requests and limits
## @param resources.requests.cpu CPU request
## @param resources.requests.memory Memory request
## @param resources.limits.cpu CPU limit
## @param resources.limits.memory Memory limit
##
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

## section Database parameters
## Parameters for database configuration
## @param database.secretName The secret name that contains the connection url for the database
database:
  secretName: null

## @section Urls
## @param universalLinkBaseUrl Base URL for universal links
universalLinkBaseUrl: null

## @section Migration parameters
## Parameters for the migration configuration
## @param migration.labels Additional labels for the migration job
## @param migration.reset Enable reset cron job
##
migration:
  labels: {}
  reset: true
