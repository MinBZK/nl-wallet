.zap-base:
  image: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/nl-wallet-app-builder-ci-quality:${BUILD_TAG}"
  rules:
    - !reference [.on-schedule-scan, rules]
    - !reference [.default-branch, rules]

.zap-scan-base:
  extends: .zap-base
  needs:
    - job: build-env-ont
      artifacts: true
    - job: deploy-apps-ont
      artifacts: false
      optional: true
  allow_failure: true
  artifacts:
    name: $CI_JOB_NAME_SLUG
    when: always
    paths:
      - zapreports/
  before_script:
    - set -euxo pipefail
    - mkdir zapreports

.run-zap-scan:
  script:
    - |
      envsubst < deploy/zap/${SUT}_zap_scan.yaml > ${ZAP_HOME}/${SUT}_zap_scan.yaml
      zap.sh -cmd -autorun ${SUT}_zap_scan.yaml
      ALERT_COUNT=$(jq '[.site[].alerts[] | select(.riskdesc | contains("Informational") | not) | select(.riskdesc | contains("False Positive") | not)] | length' zapreports/${SUT}-zap.json)
      if [[ $ALERT_COUNT -gt 0 ]]; then
        echo "ZAP Scan Completed: Non informational alerts found: $ALERT_COUNT"
        exit 1
      else
        echo "ZAP Scan Completed: No non informational alerts found"
      fi

zap-scan-demo:
  extends: .zap-scan-base
  script:
    - !reference [.run-zap-scan, script]
  variables:
    SUT: "DEMO_RP_AND_ISSUER"

zap-scan-static-server:
  extends: .zap-scan-base
  script:
    - !reference [.run-zap-scan, script]
  variables:
    SUT: "STATIC_SERVER"

zap-scan-wallet-provider:
  extends: .zap-scan-base
  script:
    - envsubst < deploy/zap/config/WALLET_PROVIDER_urls.txt > ${ZAP_HOME}/WALLET_PROVIDER_urls.txt
    - !reference [.run-zap-scan, script]
  variables:
    SUT: "WALLET_PROVIDER"

zap-scan-pid-issuer:
  extends: .zap-scan-base
  script:
    - envsubst < deploy/zap/config/PID_ISSUER_urls.txt > ${ZAP_HOME}/PID_ISSUER_urls.txt
    - !reference [.run-zap-scan, script]
  variables:
    SUT: "PID_ISSUER"

zap-scan-issuance-server:
  extends: .zap-scan-base
  script:
    - |
      AUTH_REQUEST=$(curl -fsS -H "Content-Type: application/json" "${ISSUANCE_SERVER_URL}disclosure/university_sd_jwt/request_uri?session_type=same_device")
      session_token=$(ruby -e 'require "base64"; require "json"; print (%r{/([^/]+)/response_uri$}.match JSON.parse(Base64.urlsafe_decode64(STDIN.read.split(".")[1]))["response_uri"])[1]' <<< $AUTH_REQUEST)
    - envsubst < deploy/zap/config/ISSUANCE_SERVER_urls.txt > ${ZAP_HOME}/ISSUANCE_SERVER_urls.txt
    - !reference [.run-zap-scan, script]
  variables:
    SUT: "ISSUANCE_SERVER"

zap-scan-verification-server:
  extends: .zap-scan-base
  script:
    - |
      PAYLOAD=$(envsubst <<EOD
      {
        "usecase": "mijn_amsterdam_sd_jwt",
        "return_url_template": "${RELYING_PARTY_URL}mijn_amsterdam/"
      }
      EOD
      )
      session_token=$(curl -fsS -X POST -d "$PAYLOAD" -H "Content-Type: application/json" "${INTERNAL_VERIFICATION_SERVER_URL}disclosure/sessions" | jq -r '.session_token')
    - envsubst < deploy/zap/config/VERIFICATION_SERVER_urls.txt > ${ZAP_HOME}/VERIFICATION_SERVER_urls.txt
    - !reference [.run-zap-scan, script]
  variables:
    SUT: "VERIFICATION_SERVER"

zap-scan-revocation-portal:
  extends: .zap-scan-base
  script:
    - !reference [.run-zap-scan, script]
  variables:
    SUT: "REVOCATION_PORTAL"

zap-scan-publish-results:
  rules: !reference [.zap-base, rules]
  needs:
    - { job: zap-scan-demo }
    - { job: zap-scan-static-server }
    - { job: zap-scan-wallet-provider }
    - { job: zap-scan-pid-issuer }
    - { job: zap-scan-issuance-server }
    - { job: zap-scan-verification-server }
    - { job: zap-scan-revocation-portal }
  script:
    - deploy/bin/store-artifact-zip.sh qt/quality-time/zap.zip zapreports/*.xml
