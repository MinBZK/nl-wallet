apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.names.fullname" . }}
  {{- with .Values.extraAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "common.labels.componentSelectorLabels" (list "server" .) | nindent 6 }}
  {{- with .Values.deployment }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "common.labels.componentSelectorLabels" (list "server" .) | nindent 8 }}
        {{- if .Values.extraPodLabels }}
        {{- toYaml .Values.extraPodLabels | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      containers:
        - name: {{ include "common.names.fullname" . }}
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "common.defineProbes" .Values.probes | fromYaml | toYaml | nindent 10 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8001
            - name: http-internal
              containerPort: 8002
          volumeMounts:
            - name: settings
              mountPath: /pacf_issuance_server.toml
              subPath: pacf_issuance_server.toml
            - name: metadata
              mountPath: /com.example.jum.bonuskaart.json
              subPath: com.example.jum.bonuskaart.json
            - name: status-lists
              mountPath: /status-lists
          env:
            - name: PACF_ISSUANCE_SERVER__INTERNAL_SERVER__IP
              value: "0.0.0.0"
            - name: PACF_ISSUANCE_SERVER__PUBLIC_URL
              value: {{ include "common.urls.combineDomainAndContext" (list (first .Values.httpRoute.hostnames) .Values.httpRoute.contextPath) }}
            - name: PACF_ISSUANCE_SERVER__STRUCTURED_LOGGING
              value: "true"
            - name: PACF_ISSUANCE_SERVER__METADATA
              value: "com.example.jum.bonuskaart.json"
            - name: PACF_ISSUANCE_SERVER__BATCH_SIZE
              value: {{ .Values.batchSize | quote }}
            - name: PACF_ISSUANCE_SERVER__STORAGE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: url
            - name: PACF_ISSUANCE_SERVER__ISSUER_TRUST_ANCHORS
              valueFrom:
                configMapKeyRef:
                  name: nl-wallet-server-trust-anchors
                  key: issuer_trust_anchors
            - name: PACF_ISSUANCE_SERVER__READER_TRUST_ANCHORS
              valueFrom:
                configMapKeyRef:
                  name: nl-wallet-server-trust-anchors
                  key: reader_trust_anchors
            - name: RUST_LOG
              value: "debug,hyper=warn"
      volumes:
        - name: settings
          secret:
            secretName: nl-wallet-pacf-issuance-server-settings
        - name: metadata
          configMap:
            name: nl-wallet-pacf-issuance-server-metadata
        - name: status-lists
          persistentVolumeClaim:
            claimName: {{ include "common.names.fullname" . }}
