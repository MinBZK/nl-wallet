{{ $name := include "common.names.fullname" . }}
{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    {{- with .Values.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with .Values.httpRoute.parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - backendRefs:
        - name: {{ $name }}
          port: {{ .Values.max.config.asgi.port }}
    {{- if .Values.httpRoute.contextPath }}
      matches:
        - path:
            type: PathPrefix
            value: "/{{ .Values.httpRoute.contextPath }}/"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/"
    {{- else if .Values.httpRoute.filters }}
      filters:
    {{- end }}
      {{- with .Values.httpRoute.filters }}
        {{- toYaml . | nindent 8 }}
      {{- end }}

    # .well-known redirects
    {{- if .Values.httpRoute.contextPath }}
    {{- $port := .Values.max.config.asgi.port }}
    {{- $contextPath := .Values.httpRoute.contextPath }}
    {{- $filters := .Values.httpRoute.filters }}
    {{- range list "openid-configuration" }}
    - backendRefs:
        - name: {{ $name }}
          port: {{ $port }}
      matches:
        - path:
            type: PathPrefix
            value: "/.well-known/{{ . }}/{{ $contextPath }}"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/.well-known/{{ . }}"
        {{- with $filters }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    {{- end }}

{{- end }}
