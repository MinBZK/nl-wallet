{{- $extraFiles := keys .Values.keycloak.extraImportFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" . }}-import
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
{{- if .Values.keycloak.extraImportFiles }}
{{- range $path, $content := .Values.keycloak.extraImportFiles }}
{{- $path | nindent 2 }}: |-
{{- tpl $content $ | toString | nindent 4 }}
{{- end }}
{{- end }}
{{- range $path, $_ := .Files.Glob "import/*" }}
{{- $base := $path | base }}
{{- if not (has $base $extraFiles) }}
{{- $base | nindent 2 }}: |-
{{- tpl ($.Files.Get $path) $ | toString | nindent 4 }}
{{- end }}
{{- end }}
