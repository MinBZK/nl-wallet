# Example acf_demo_issuer config
#
# The acf_demo_issuer is a demo issuer for the OpenID4VCI authorization-code flow. It authenticates
# the holder with a local consent page (no upstream identity provider) and issues the documents
# configured per usecase. A usecase is selected by the `issuer_state` value carried in the credential
# offer (built by the demo_issuer frontend) and echoed back by the wallet in its authorization request.

# Whether HTTP requests/responses should be logged, default value: false
log_requests = false

# Emit logs in JSON format, default value: false
structured_logging = false

# Array of CAs with trusted issuers
issuer_trust_anchors = ["MII..."]

# Array of CAs for Wallet Instance Attestation (WIA) certificates
wia_trust_anchors = ["MII..."]

# The wallet must be able to reach the server at this URL. The consent page is served at
# `<public_url>/consent`.
public_url = 'http://localhost:8001/'

# Exact-match allowlist of `redirect_uri` values the wallet may use in a Pushed Authorization Request.
wallet_redirect_uris = ["http://localhost:3004/return"]

# The `client_id` values that this server accepts, identifying the wallet implementation.
# Default value: https://wallet.edi.rijksoverheid.nl
wallet_client_ids = ["https://wallet.edi.rijksoverheid.nl"]

# Files containing SD-JWT Type Metadata documents for issued attestations
metadata = ["com_example_insurance_metadata.json"]

# Maximum number of attestation copies the wallet may request per credential in a single batch
batch_size = 10

# Public and internal endpoints for the issuer
[wallet_server]
ip = "127.0.0.1"
port = 8001

[internal_server]
ip = "127.0.0.1"
port = 8002

# Where to store session state. Can be `memory://` or a `postgres://..` url.
# Memory is ephemeral, default value: memory://
[storage]
url = "memory://"

# Status list settings (values are the defaults if unset). For a memory-backed demo, set serve =
# false so no status list database is required.
[status_lists]
list_size = 100_000
create_threshold_ratio = 0.1
expiry_in_hours = 24
refresh_threshold_ratio = 0.25
serve = true

# Usecases. Each is keyed by the `issuer_state` value used in the credential offer.
#
# Configuration fields for a usecase:
# * kind: "consent" (redirects to the consent page) or "immediate" (issues immediately with no user
#   interaction). Defaults to "consent".
# * documents: the documents to issue, as an array of [[usecases.<name>.documents]] tables with
#   `format` ("mso_mdoc" or "dc+sd-jwt"), `attestation_type`, and an `attributes` table.
[usecases.insurance]
kind = "consent"

[[usecases.insurance.documents]]
format = "mso_mdoc"
attestation_type = "com.example.insurance"
attributes = { product = "Health Insurance", coverage = "Basic", start_date = "2025-01-01", duration = "365", customer_number = "283728" }

# Configuration fields for credential_configurations
# * format: Credential format, either "dc+sd-jwt" or "mso_mdoc"
# * attestation_type: The "vct" or "doc_type" value respectively
# * private_key_type: Can be hsm or software, when hsm private_key
#   should contain a string identifying the private key in the HSM
# * private_key: Base64 encoded DER format private key, or string
# * certificate: Base64 encoded DER format certificate
# * valid_days: How long are these attestations valid, in days
[credential_configurations."com.example.insurance"]
format = "mso_mdoc"
attestation_type = "com.example.insurance"
valid_days = 365
private_key_type = "software"
private_key = "MIG..."
certificate = "MIJ..."

# Associated status list settings for the attestation type
[credential_configurations."com.example.insurance".status_list]
group_name = "com.example.insurance"
context_path = "/tsl"
publish_dir = "/srv/html/tsl"
private_key_type = "software"
private_key = "MIG..."
certificate = "MIJ..."
