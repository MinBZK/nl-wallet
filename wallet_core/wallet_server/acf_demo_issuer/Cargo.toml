[package]
name = "acf_demo_issuer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[lib]
doctest = false

[[bin]]
name = "acf_demo_issuer"

[[test]]
name = "settings"
path = "tests/settings.rs"
required-features = ["integration_test"]

[features]
# Allow Credential Issuer Identifiers to contain "http://".
allow_insecure_url = ["openid4vc/allow_insecure_url"]
# Enable integration tests
integration_test = ["allow_insecure_url", "server_utils/parsed_key_pair_conversion"]
# Enable test API endpoints and Swagger UI for the management API. This should not be used in production.
test_internal_ui = ["utoipa-swagger-ui/axum", "utoipa-swagger-ui/vendored", "status_lists/test_api"]

[dependencies]
anyhow.workspace = true
askama.workspace = true
askama_web = { workspace = true, features = ["axum-0.8"] }
axum = { workspace = true, features = ["json"] }
config = { workspace = true, features = ["toml", "preserve_order"] }
derive_more = { workspace = true, features = ["into"] }
itertools.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_valid.workspace = true
serde_with.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "net", "sync"] }
tower.workspace = true
tower-http = { workspace = true, features = ["fs"] }
tracing.workspace = true
url = { workspace = true, features = ["serde"] }

utoipa-swagger-ui = { workspace = true, optional = true }

web_utils.path = "../../lib/web_utils"

attestation_data.path = "../../lib/attestation_data"
attestation_types.path = "../../lib/attestation_types"
crypto.path = "../../lib/crypto"
issuer_common.path = "../issuer_common"
health_checkers.path = "../../lib/health_checkers"
hsm.path = "../../lib/hsm"
http_utils = { path = "../../lib/http_utils", features = ["server"] }
openid4vc = { path = "../../lib/openid4vc", features = ["axum"] }
openid4vc_server = { path = "../../lib/openid4vc_server", features = ["issuance"] }
utils.path = "../../lib/utils"
server_utils = { path = "../server_utils", features = ["postgres"] }
status_lists = { path = "../../lib/status_lists", features = ["axum"] }

[build-dependencies]
web_utils = { path = "../../lib/web_utils", features = ["build"] }

[dev-dependencies]
indexmap = { workspace = true, features = ["serde"] }
p256 = { workspace = true, features = ["ecdsa"] }
tokio = { workspace = true, features = ["macros"] }

openid4vc = { path = "../../lib/openid4vc", features = ["mock", "test"] }
token_status_list = { path = "../../lib/token_status_list", features = ["mock"] }
